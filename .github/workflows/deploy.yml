# Deploy to server: rsync → /home/verifield/admin/
# Secrets (all required for SSH): VERIFIELD_HOST, VERIFIELD_PORT, VERIFIELD_USER,
#          VERIFIELD_SSH_KEY, VERIFIELD_PASSPHRASE (empty string if key has no passphrase)
# Rsync only — avoid recursive chmod on the deploy tree (avoids permission errors
# on node_modules, .next, or system-owned paths).
name: Deploy admin

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          VERIFIELD_HOST: ${{ secrets.VERIFIELD_HOST }}
          VERIFIELD_USER: ${{ secrets.VERIFIELD_USER }}
          VERIFIELD_PORT: ${{ secrets.VERIFIELD_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.VERIFIELD_SSH_KEY }}
          SSH_PASSPHRASE: ${{ secrets.VERIFIELD_PASSPHRASE }}
        run: |
          set -eo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          python3 <<'PY'
          import os, pathlib, re, sys

          def need(name, val):
              if val is None or not str(val).strip():
                  sys.exit(f"ERROR: {name} secret is missing or empty (check GitHub repo secrets).")

          host = (os.environ.get("VERIFIELD_HOST") or "").strip()
          user = (os.environ.get("VERIFIELD_USER") or "").strip()
          port = re.sub(r"\s+", "", os.environ.get("VERIFIELD_PORT") or "")
          need("VERIFIELD_HOST", host)
          need("VERIFIELD_USER", user)
          need("VERIFIELD_PORT", port)
          if not port.isdigit() or not (1 <= int(port) <= 65535):
              sys.exit(f"ERROR: VERIFIELD_PORT must be a number 1-65535; got {port!r}")

          key = os.environ.get("SSH_PRIVATE_KEY", "")
          if not key or not key.strip():
              sys.exit("ERROR: VERIFIELD_SSH_KEY secret is missing or empty.")

          p = pathlib.Path.home() / ".ssh" / "deploy_key"
          text = key if key.endswith("\n") else key + "\n"
          p.write_text(text)
          p.chmod(0o600)

          env_file = pathlib.Path.home() / ".ssh" / "verifield_deploy_env"
          env_file.write_text(f"DEPLOY_HOST={host}\nDEPLOY_USER={user}\nDEPLOY_PORT={port}\n")
          PY

          set -a
          # shellcheck disable=SC1090
          source "${HOME}/.ssh/verifield_deploy_env"
          set +a

          touch ~/.ssh/known_hosts
          echo "=== ssh-keyscan (optional — GitHub runners are often blocked on custom SSH ports) ==="
          if ssh-keyscan -T 20 -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/tmp/keyscan.err; then
            echo "Host key stored in known_hosts."
          else
            echo "WARN: ssh-keyscan could not reach ${DEPLOY_HOST}:${DEPLOY_PORT} from this runner."
            echo "Continuing — SSH uses StrictHostKeyChecking=accept-new on first connect."
            cat /tmp/keyscan.err 2>/dev/null || true
          fi

          eval "$(ssh-agent -s)"
          if [ -n "${SSH_PASSPHRASE:-}" ]; then
            export SSH_PASSPHRASE
            echo '#!/bin/sh' > /tmp/ssh-askpass.sh
            echo 'printf "%s\n" "$SSH_PASSPHRASE"' >> /tmp/ssh-askpass.sh
            chmod +x /tmp/ssh-askpass.sh
            DISPLAY=:0 SSH_ASKPASS=/tmp/ssh-askpass.sh SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/deploy_key
          else
            ssh-add ~/.ssh/deploy_key
          fi
          ssh-add -l

          # accept-new: trust host on first connect if keyscan could not pre-populate (common on restricted networks)
          SSH_BASE="-v -i ${HOME}/.ssh/deploy_key -p ${DEPLOY_PORT} -o ConnectTimeout=10 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=${HOME}/.ssh/known_hosts"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          DEST="/home/verifield/admin/"

          echo "=== ssh mkdir (verbose, ConnectTimeout=10) ==="
          ssh ${SSH_BASE} "${REMOTE}" "mkdir -p ${DEST}"

          echo "=== rsync (ssh -v via SSH_BASE) ==="
          rsync -avz --delete \
            -e "ssh ${SSH_BASE}" \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='out/' \
            --exclude='.env' \
            --exclude='.env.*' \
            ./ "${REMOTE}:${DEST}"

          echo "=== deploy complete (run npm ci && npm run build on server if .next is not rsynced) ==="
