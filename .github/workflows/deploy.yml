# Deploy to server: rsync → /home/verifield/admin/
# Secrets: VERIFIELD_HOST, VERIFIELD_PORT (optional, default 22), VERIFIELD_USER,
#          VERIFIELD_SSH_KEY (full private key with real newlines), VERIFIELD_PASSPHRASE (if key encrypted)
name: Deploy admin

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync + fix permissions
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VERIFIELD_SSH_KEY }}
          SSH_PASSPHRASE: ${{ secrets.VERIFIELD_PASSPHRASE }}
          DEPLOY_HOST: ${{ secrets.VERIFIELD_HOST }}
          DEPLOY_USER: ${{ secrets.VERIFIELD_USER }}
          DEPLOY_PORT: ${{ secrets.VERIFIELD_PORT }}
        run: |
          set -eo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          python3 <<'PY'
          import os, pathlib, sys
          key = os.environ.get("SSH_PRIVATE_KEY", "")
          if not key or not key.strip():
              sys.exit("ERROR: VERIFIELD_SSH_KEY secret is missing or empty.")
          p = pathlib.Path.home() / ".ssh" / "deploy_key"
          text = key if key.endswith("\n") else key + "\n"
          p.write_text(text)
          p.chmod(0o600)
          PY

          PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "${PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          eval "$(ssh-agent -s)"
          if [ -n "${SSH_PASSPHRASE:-}" ]; then
            export SSH_PASSPHRASE
            echo '#!/bin/sh' > /tmp/ssh-askpass.sh
            echo 'printf "%s\n" "$SSH_PASSPHRASE"' >> /tmp/ssh-askpass.sh
            chmod +x /tmp/ssh-askpass.sh
            DISPLAY=:0 SSH_ASKPASS=/tmp/ssh-askpass.sh SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/deploy_key
          else
            ssh-add ~/.ssh/deploy_key
          fi
          ssh-add -l

          # accept-new: trust host on first connect if keyscan could not pre-populate (common on restricted networks)
          SSH_BASE="-p ${PORT} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=${HOME}/.ssh/known_hosts"
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          DEST="/home/verifield/admin/"

          ssh ${SSH_BASE} "${REMOTE}" "mkdir -p ${DEST}"

          rsync -avz --delete \
            -e "ssh ${SSH_BASE}" \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='out/' \
            --exclude='.env' \
            --exclude='.env.*' \
            ./ "${REMOTE}:${DEST}"

          ssh ${SSH_BASE} "${REMOTE}" \
            "find ${DEST} -type d -exec chmod 755 {} + && find ${DEST} -type f -exec chmod 644 {} +"
